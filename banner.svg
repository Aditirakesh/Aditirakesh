<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="100%" stop-color="#101524" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0" />
      <stop offset="15%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="85%" stop-color="#bc8cff" stop-opacity="1" />
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0" />
    </linearGradient>
    <pattern id="dot-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" />
  <rect width="1200" height="280" fill="url(#dot-grid)" />

  <!-- Accent Divider Line -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#line-grad)" />

  <!-- Content -->
  <g transform="translate(100, 90)">
    <!-- Subheading/School -->
    <text x="0" y="0" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" letter-spacing="2">
      COMPUTER SCIENCE STUDENT @ IIIT ALLAHABAD
    </text>

    <!-- Main Title -->
    <text x="0" y="52" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">
      Aditi Rakesh
    </text>

    <!-- Key Fields -->
    <text x="0" y="96" fill="#c9d1d9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" opacity="0.9">
      Systems Programming, Software Engineering &amp; Web Development
    </text>

    <!-- Tech Badges (SVG Inline) -->
    <g transform="translate(0, 130)" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" font-weight="500">
      <!-- C -->
      <rect x="0" y="0" width="46" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="23" y="17" fill="#58a6ff" text-anchor="middle">C</text>

      <!-- C++ -->
      <rect x="54" y="0" width="60" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="84" y="17" fill="#3572a5" text-anchor="middle">C++</text>

      <!-- Python -->
      <rect x="122" y="0" width="82" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="163" y="17" fill="#3572a5" text-anchor="middle">Python</text>

      <!-- SQL -->
      <rect x="212" y="0" width="60" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="242" y="17" fill="#e38e00" text-anchor="middle">SQL</text>

      <!-- JavaScript -->
      <rect x="280" y="0" width="110" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="335" y="17" fill="#d0b440" text-anchor="middle">JavaScript</text>

      <!-- HTML & CSS -->
      <rect x="398" y="0" width="114" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="455" y="17" fill="#f78166" text-anchor="middle">HTML &amp; CSS</text>

      <!-- Git -->
      <rect x="520" y="0" width="56" height="26" rx="4" fill="#0f1423" stroke="#30364d" stroke-width="1" />
      <text x="548" y="17" fill="#8b949e" text-anchor="middle">Git</text>
    </g>
  </g>
</svg>
