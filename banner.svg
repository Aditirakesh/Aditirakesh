<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <radialGradient id="glow-left" cx="0%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="100%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7000ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>
    <linearGradient id="card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0.3" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="350" fill="url(#bg)" />
  <rect width="1200" height="350" fill="url(#glow-left)" />
  <rect width="1200" height="350" fill="url(#glow-right)" />
  <rect width="1200" height="350" fill="url(#grid)" />

  <!-- Code Window on the right -->
  <g transform="translate(750, 45)" opacity="0.9">
    <rect width="380" height="260" rx="12" fill="#0d1117" fill-opacity="0.6" stroke="url(#card-border)" stroke-width="1.5" />
    <path d="M 0 35 L 380 35" stroke="#1f2937" stroke-width="1" />
    <circle cx="20" cy="18" r="6" fill="#ff5f56" />
    <circle cx="40" cy="18" r="6" fill="#ffbd2e" />
    <circle cx="60" cy="18" r="6" fill="#27c93f" />
    <rect x="90" y="8" width="90" height="27" rx="5" fill="#1f2937" fill-opacity="0.4" />
    <text x="107" y="25" fill="#9ca3af" font-family="monospace" font-size="11">aditi.js</text>

    <g transform="translate(25, 60)" font-family="Consolas, Fira Code, monospace" font-size="12">
      <text x="0" y="15" fill="#f47067">const</text>
      <text x="45" y="15" fill="#6cb6ff">developer</text>
      <text x="120" y="15" fill="#ff7b72">=</text>
      <text x="135" y="15" fill="#e1e4e8">{</text>

      <text x="20" y="35" fill="#79c0ff">name</text>
      <text x="60" y="35" fill="#ff7b72">:</text>
      <text x="75" y="35" fill="#a5d6ff">'Aditi'</text>
      <text x="130" y="35" fill="#e1e4e8">,</text>

      <text x="20" y="55" fill="#79c0ff">role</text>
      <text x="60" y="55" fill="#ff7b72">:</text>
      <text x="75" y="55" fill="#a5d6ff">'CS Student @ IIIT'</text>
      <text x="225" y="55" fill="#e1e4e8">,</text>

      <text x="20" y="75" fill="#79c0ff">code</text>
      <text x="60" y="75" fill="#ff7b72">:</text>
      <text x="75" y="75" fill="#e1e4e8">[</text>
      <text x="85" y="75" fill="#a5d6ff">'C'</text>
      <text x="105" y="75" fill="#e1e4e8">,</text>
      <text x="120" y="75" fill="#a5d6ff">'JavaScript'</text>
      <text x="215" y="75" fill="#e1e4e8">,</text>
      <text x="230" y="75" fill="#a5d6ff">'HTML'</text>
      <text x="280" y="75" fill="#e1e4e8">],</text>

      <text x="20" y="95" fill="#79c0ff">passion</text>
      <text x="80" y="95" fill="#ff7b72">:</text>
      <text x="95" y="95" fill="#a5d6ff">'Building cool things'</text>
      <text x="285" y="95" fill="#e1e4e8">,</text>

      <text x="20" y="115" fill="#79c0ff">learningMode</text>
      <text x="120" y="115" fill="#ff7b72">:</text>
      <text x="135" y="115" fill="#ff7b72">true</text>

      <text x="0" y="135" fill="#e1e4e8">};</text>

      <text x="0" y="165" fill="#ff7b72">function</text>
      <text x="65" y="165" fill="#d73a49">createSolutions</text>
      <text x="175" y="165" fill="#e1e4e8">()</text>
      <text x="195" y="165" fill="#e1e4e8">{</text>
      <text x="20" y="185" fill="#f47067">return</text>
      <text x="75" y="185" fill="#6cb6ff">developer</text>
      <text x="145" y="185" fill="#e1e4e8">.</text>
      <text x="155" y="185" fill="#d73a49">build</text>
      <text x="190" y="185" fill="#e1e4e8">();</text>
      <text x="0" y="205" fill="#e1e4e8">}</text>
    </g>
  </g>

  <!-- Title (Left Side) -->
  <g transform="translate(80, 0)">
    <rect x="0" y="95" width="130" height="26" rx="13" fill="#1f2937" fill-opacity="0.6" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1" />
    <circle cx="15" cy="108" r="4" fill="#00f2fe" />
    <text x="28" y="112" fill="#9ca3af" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="1">WELCOME TO MY</text>

    <text x="0" y="175" fill="url(#text-gradient)" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="52" letter-spacing="-1">GITHUB PROFILE</text>

    <text x="0" y="215" fill="#e5e7eb" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="18" letter-spacing="0.5">Hi, I'm Aditi — CS Student @ IIIT</text>

    <text x="0" y="240" fill="#9ca3af" font-family="'Segoe UI', sans-serif" font-size="14" opacity="0.9">Passionate about building robust software and exploring new technologies.</text>

    <g transform="translate(0, 275)">
      <circle cx="10" cy="0" r="5" fill="#00f2fe" />
      <text x="22" y="4" fill="#9ca3af" font-family="monospace" font-size="12">Innovate</text>

      <circle cx="110" cy="0" r="5" fill="#7000ff" />
      <text x="122" y="4" fill="#9ca3af" font-family="monospace" font-size="12">Collaborate</text>

      <circle cx="230" cy="0" r="5" fill="#ff007f" />
      <text x="242" y="4" fill="#9ca3af" font-family="monospace" font-size="12">Create</text>
    </g>
  </g>
</svg>
